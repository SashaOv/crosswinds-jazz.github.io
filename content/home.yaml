  - text: >
      We are a San Francisco Bay Area Jazz Fusion group consisting of seasoned
      jazz musicians who respect and love modern jazz from bebop to fusion.
      Our sound reflects deep roots in complex jazz harmony while embracing
      modern funk and Latin sounds.
