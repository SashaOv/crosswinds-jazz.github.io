      text: >
        Sasha began taking violin lessons as a child. As a teenager, he happened
        to start playing bass in a rock band—and quickly got hooked. He later
        studied at a jazz college in Moscow. Although his professional career
        has been in software, he has continued to perform on professional stages
        in the countries where he has lived. Today, he plays jazz and world
        music in the Bay Area.
