    - title: Sasha - Bass
      text: >
        Sasha Ovsankin began taking violin lessons as a child. As a teenager, he happened
        to start playing bass in a rock band—and quickly got hooked. He later
        studied at a jazz college in Moscow. Although his professional career
        has been in software, he has continued to perform on professional stages
        in the countries where he has lived. Today, he plays jazz and world
        music in the Bay Area.
      photo: assets/Sasha-BlueNoteLounge_Feb2015-35.jpg
      
    - title: Peter - Drums
      text: > 
        An open ear and solid groove are what drummer Peter Romo is known for. He learned to
        play in a Drum Corps drumline and studied jazz, Latin and funk under Bay
        Area drum greats Wally Schnalle, Curt Moore and Ron E. Beck. Having
        roots in rudimental drumming, he taught high school drumline and indoor
        percussion. Peter has played with Bay Area rock, funk and jazz bands.
      photo: assets/Peter.picture-13.jpg
