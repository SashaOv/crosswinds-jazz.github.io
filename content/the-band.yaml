- title: Crosswinds
  hero: >
    (TODO) Crosswinds is a jazz band based in the San Francisco Bay Area. The band was
    formed in 2010 by saxophonist Norm and guitarist Ricardo, who had been
    playing together in various local groups for several years. They were joined
    by pianist Ina, bassist Sasha, and drummer Peter, who completed the lineup.

    Crosswinds is known for their energetic live performances and their ability
    to connect with audiences through their music. They continue to evolve their
    sound and explore new musical territories while staying true to their jazz
    roots.
